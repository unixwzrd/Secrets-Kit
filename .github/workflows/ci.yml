name: ci

# Full Python matrix on macOS: every push/PR runs tests on 3.9–3.13 (see matrix below).
# Release tag workflow also runs validate + per-Python wheels; wheel smoke uses the same
# interpreter as each matrix leg (not a single “golden” Python).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e .
      - name: Run local validation
        run: |
          bash ./scripts/run_local_validation.sh
