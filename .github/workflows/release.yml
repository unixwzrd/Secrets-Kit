name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the built distributions to PyPI using trusted publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m pip install -e .
      - name: Validate
        run: |
          bash ./scripts/run_local_validation.sh --without-localhost-transport
      - name: Build distributions
        run: |
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: seckit-dist
          path: dist/*

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: seckit-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
