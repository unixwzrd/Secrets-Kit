[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "seckit"
version = "0.9.0"
description = "Local macOS CLI for handling secrets and PII without leaving them scattered in plain-text files"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "unixwzrd", email = "unixwzrd@unixwzrd.ai" }]
dependencies = [
]

[project.optional-dependencies]
yaml = [
  "PyYAML>=6.0",
]
crypto = [
  "cryptography>=42.0.0",
]

[project.scripts]
secrets-kit = "secrets_kit.cli:main"
seckit = "secrets_kit.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
